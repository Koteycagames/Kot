<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KotoGram</title>
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="app-container" id="app-viewport">
        
        <aside class="sidebar" id="sidebar">
            <header class="sidebar-header">
                <button class="icon-btn" id="burger-menu-btn">
                    <span class="material-icons">menu</span>
                </button>
                <div class="search-container">
                    <span class="material-icons search-icon">search</span>
                    <input type="text" id="search-input" placeholder="Поиск...">
                </div>
            </header>

            <div class="chat-list" id="chat-list">
                <div class="info-message">Загрузка...</div>
            </div>
            
            <button class="floating-btn" id="new-chat-btn">
                <span class="material-icons">edit</span>
            </button>
            
            <div class="current-user-profile">
                <div class="my-info">
                    <h4 id="my-display-name">...</h4>
                    <span id="my-phone-number">...</span>
                </div>
                <button class="icon-btn" id="logout-btn">
                    <span class="material-icons">logout</span>
                </button>
            </div>
        </aside>

        <main class="chat-area" id="chat-area">
            <div class="no-chat-selected" id="no-chat-selected">
                <p>Выберите чат</p>
            </div>

            <div class="active-chat" id="active-chat" style="display: none;">
                <header class="chat-header">
                    <button class="icon-btn back-btn" id="back-to-sidebar-btn">
                        <span class="material-icons">arrow_back</span>
                    </button>
                    <div class="chat-info" style="flex: 1;">
                        <h3 id="current-chat-name">Чат</h3>
                    </div>
                    <button class="icon-btn" id="call-btn" style="color: var(--primary-color);">
                        <span class="material-icons">call</span>
                    </button>
                </header>

                <div class="messages-container" id="messages-container"></div>

                <footer class="chat-input-area">
                    <button class="icon-btn" id="attach-btn">
                        <span class="material-icons">attach_file</span>
                    </button>
                    <input type="file" id="image-input" accept="image/*" style="display: none;">
                    <textarea id="message-input" placeholder="Сообщение..." rows="1"></textarea>
                    <button class="icon-btn" id="send-btn">
                        <span class="material-icons">send</span>
                    </button>
                </footer>
            </div>
        </main>
        
        <div class="modal-overlay" id="new-chat-modal" style="display: none;">
            <div class="modal-content">
                <h3>Написать по номеру</h3>
                <input type="tel" id="new-chat-phone" placeholder="+79991234567">
                <button class="btn primary-btn" id="start-new-chat-btn">Найти и написать</button>
                <button class="btn" id="close-new-chat-btn">Отмена</button>
                <div id="new-chat-error" class="error-text"></div>
            </div>
        </div>
        
        <div class="modal-overlay" id="image-preview-modal" style="display: none;">
            <div class="modal-content">
                <img id="preview-image" src="" style="max-height: 50vh; object-fit: contain;">
                <button class="btn primary-btn" id="send-image-btn">Отправить фото</button>
                <button class="btn" id="close-preview-btn">Закрыть</button>
            </div>
        </div>

        <div class="modal-overlay" id="incoming-call-modal" style="display: none; z-index: 2000; background: rgba(0,0,0,0.85);">
            <div class="modal-content" style="text-align: center; background: #222; color: white; border: 1px solid #333;">
                <div class="avatar-placeholder" style="width: 80px; height: 80px; margin: 0 auto 15px auto; background: var(--primary-color);">
                    <span class="material-icons" style="font-size: 40px;">person</span>
                </div>
                <h3 style="margin-bottom: 5px; font-weight: normal; color: #aaa;">Входящий звонок</h3>
                <h2 id="caller-name" style="margin-bottom: 30px; font-size: 24px;">Имя звонящего</h2>
                
                <div style="display: flex; justify-content: space-around; gap: 20px;">
                    <button class="control-btn hangup" id="decline-call-btn" style="width: 60px; height: 60px; border-radius: 50%; border: none; background: #e53935; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                        <span class="material-icons" style="font-size: 28px;">call_end</span>
                    </button>
                    <button class="control-btn accept" id="accept-call-btn" style="width: 60px; height: 60px; border-radius: 50%; border: none; background: #4caf50; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; animation: pulse 1.5s infinite;">
                        <span class="material-icons" style="font-size: 28px;">call</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <style>
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(76, 175, 80, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }
    </style>

    <script type="module" src="main.js"></script>
</body>
</html>

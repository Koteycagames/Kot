<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KotoGram</title>
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        
        <aside class="sidebar" id="sidebar">
            <header class="sidebar-header">
                <button class="icon-btn" id="menu-btn" title="Меню">
                    <span class="material-icons">menu</span>
                </button>
                <div class="search-container">
                    <span class="material-icons search-icon">search</span>
                    <input type="text" id="search-input" placeholder="Поиск пользователей...">
                </div>
            </header>

            <div class="chat-list" id="chat-list">
                <div class="info-message">Загрузка контактов...</div>
                </div>
            
            <div class="current-user-profile">
                <div class="avatar-placeholder" id="my-avatar-placeholder">
                    <span class="material-icons">person</span>
                </div>
                <div class="my-info">
                    <h4 id="my-display-name">Загрузка...</h4>
                    <span id="my-phone-number">...</span>
                </div>
                <button class="icon-btn logout-btn" id="logout-btn" title="Выйти">
                    <span class="material-icons">logout</span>
                </button>
            </div>
        </aside>

        <main class="chat-area" id="chat-area">
            
            <div class="no-chat-selected" id="no-chat-selected">
                <div class="no-chat-content">
                    <span class="material-icons" style="font-size: 64px; color: var(--text-secondary);">chat</span>
                    <p>Выберите чат, чтобы начать общение</p>
                </div>
            </div>

            <div class="active-chat" id="active-chat" style="display: none;">
                
                <header class="chat-header">
                    <button class="icon-btn back-btn" id="back-to-sidebar-btn" title="Назад к списку">
                        <span class="material-icons">arrow_back</span>
                    </button>
                    <div class="chat-info">
                        <div class="avatar-placeholder chat-avatar" id="current-chat-avatar">
                            <span class="material-icons">person</span>
                        </div>
                        <div class="chat-details">
                            <h3 id="current-chat-name">Имя собеседника</h3>
                            <span class="chat-status" id="current-chat-status">Был(а) недавно</span>
                        </div>
                    </div>
                </header>

                <div class="messages-container" id="messages-container">
                    </div>

                <footer class="chat-input-area">
                    <button class="icon-btn attach-btn" id="attach-btn" title="Прикрепить картинку">
                        <span class="material-icons">attach_file</span>
                    </button>
                    <input type="file" id="image-input" accept="image/*" style="display: none;">
                    
                    <textarea id="message-input" placeholder="Напишите сообщение..." rows="1"></textarea>
                    
                    <button class="icon-btn send-btn" id="send-btn" title="Отправить">
                        <span class="material-icons">send</span>
                    </button>
                </footer>
            </div>
        </main>
        
        <div class="image-preview-modal" id="image-preview-modal" style="display: none;">
            <div class="modal-content">
                <button class="icon-btn close-modal-btn" id="close-preview-btn">
                    <span class="material-icons">close</span>
                </button>
                <img id="preview-image" src="" alt="Предпросмотр">
                <button class="btn primary-btn" id="send-image-btn">Отправить картинку</button>
            </div>
        </div>

    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
